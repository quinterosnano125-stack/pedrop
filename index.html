<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💝 Cena Romántica - 3 Meses Contigo 💝</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #fff5e1 50%, #e8f4f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 80px rgba(255, 105, 180, 0.3);
            max-width: 900px;
            width: 100%;
            text-align: center;
            border: 3px solid #d4a5a5;
        }

        .invitation-section {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }

        .invitation-section img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.25);
        }

        .image-section {
            margin: 35px 0;
            padding-top: 35px;
            border-top: 3px solid #d4a5a5;
        }

        .section-title {
            color: #e57373;
            font-size: 1.3em;
            margin: 20px 0 15px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .upload-area {
            border: 3px dashed #e57373;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffe4f0 0%, #fff0f5 100%);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #c62828;
            background: linear-gradient(135deg, #ffd4e5 0%, #ffe4f0 100%);
            transform: scale(1.02);
        }

        .upload-area p {
            color: #e57373;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        input[type="file"] {
            display: none;
        }

        #uploadedImage img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.25);
        }

        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 2em;
            animation: fall 5s infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .divider {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #e57373;
            font-size: 1.2em;
        }

        .divider::before,
        .divider::after {
            content: '—';
            flex: 1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            .section-title {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="invitation-section">
            <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwMCIgaGVpZ2h0PSIxMjAwIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMDAwIiBoZWlnaHQ9IjEyMDAiIGZpbGw9IiNmNWYwZjAiLz48L3N2Zz4=" alt="Cena Romántica - 3 Meses" style="max-width: 100%; border-radius: 20px; box-shadow: 0 15px 40px rgba(255, 105, 180, 0.25);">
        </div>

        <div class="image-section">
            <p class="section-title">📸 Tu Foto Especial</p>
            <div class="upload-area" id="uploadArea">
                <p>📤 Sube una foto aquí</p>
                <small style="color: #e57373;">PNG, JPG, GIF (máx. 5MB)</small>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <div id="uploadedImage" style="display: none;"></div>
        </div>

        <div class="divider">💝</div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadedImage = document.getElementById('uploadedImage');

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#c62828';
            uploadArea.style.background = 'linear-gradient(135deg, #ffd4e5 0%, #ffe4f0 100%)';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#e57373';
            uploadArea.style.background = 'linear-gradient(135deg, #ffe4f0 0%, #fff0f5 100%)';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Por favor, carga una imagen válida');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                alert('La imagen debe ser menor a 5MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                uploadArea.style.display = 'none';
                uploadedImage.style.display = 'block';
                uploadedImage.innerHTML = `<img src="${e.target.result}" alt="Foto especial">`;
                createHearts();
            };
            reader.readAsDataURL(file);
        }

        function createHearts() {
            const hearts = document.getElementById('hearts');
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = ['💕', '💙', '💚', '💛', '🌹'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                hearts.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }
        }

        // Crear algunos corazones al cargar la página
        window.addEventListener('load', () => {
            createHearts();
        });
    </script>
</body>
</html>
